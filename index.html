<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A8 Recording NYC — Production &amp; Songwriting Studio</title>
<meta name="description" content="A8 Recording is a New York production and songwriting house. Songwriting, composition, lyric writing, vocal production, mixing, and scoring across pop, R&amp;B, alternative, and film.">
<meta property="og:title" content="A8 Recording NYC — Production &amp; Songwriting Studio">
<meta property="og:description" content="A New York production and songwriting house — pop, R&amp;B, alternative, and cinematic work for international release.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121016;
    --bg-soft:#17141C;
    --panel:#1C1821;
    --panel-line:#2D2731;
    --text:#F4F1EC;
    --muted:#9A92A0;
    --muted-dim:#857E8C;
    --accent:#FF3B6E;
    --accent-soft:rgba(255,59,110,.14);
    --accent-line:rgba(255,59,110,.35);
    --mono:'Space Mono',ui-monospace,monospace;
    --display:'Unbounded',sans-serif;
    --body:'Manrope','Noto Sans TC',sans-serif;
    --maxw:780px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  [hidden]{display:none !important;}
  a{color:inherit;text-decoration:none;}
  ul,ol{margin:0;padding:0;list-style:none;}
  h1,h2,h3{margin:0;font-family:var(--display);font-weight:700;}
  p{margin:0;}
  img,svg{display:block;max-width:100%;}
  ::selection{background:var(--accent);color:#150C10;}
  a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

  /* ---------- topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(18,16,22,.82);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--panel-line);
  }
  .topbar .wrap{
    display:flex;align-items:center;justify-content:space-between;
    padding-top:16px;padding-bottom:16px;
  }
  .word{
    font-family:var(--mono);font-weight:700;font-size:14px;
    letter-spacing:.12em;color:var(--text);
  }
  .word .dot{color:var(--accent);}
  .topbar nav{display:flex;align-items:center;gap:14px;}
  .lang-toggle{
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    background:transparent;border:1px solid var(--panel-line);color:var(--muted);
    padding:7px 12px;border-radius:999px;cursor:pointer;
    transition:border-color .2s, color .2s;
  }
  .lang-toggle:hover{border-color:var(--accent);color:var(--text);}
  .cta-mini{
    font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    background:var(--accent);color:#150C10;font-weight:700;
    padding:8px 14px;border-radius:999px;
    transition:opacity .2s;
  }
  .cta-mini:hover{opacity:.85;}

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    padding:88px 0 64px;
    overflow:hidden;
    border-bottom:1px solid var(--panel-line);
  }
  
  /* WIDER & TALLER ANIMATED BARS */
  .eq{
    position:absolute;left:0;right:0;bottom:0;top:0;
    display:flex;align-items:flex-end;justify-content:center;gap:10px; /* Wider gap */
    opacity:.16;pointer-events:none;
    overflow:hidden;
  }
  .eq span{
    width:8px; /* Thicker bars */
    background:var(--accent);border-radius:4px 4px 0 0;
    height:90%; /* Taller height */
    transform-origin:bottom;
    animation:eqPulse 2.4s ease-in-out infinite;
    animation-delay:calc(var(--i) * 0.09s);
    flex-shrink: 0;
  }
  @keyframes eqPulse{
    0%,100%{transform:scaleY(.22);}
    20%{transform:scaleY(.8);}
    40%{transform:scaleY(.38);}
    60%{transform:scaleY(1);}
    80%{transform:scaleY(.5);}
  }
  /* END BARS CSS */

  .hero-inner{position:relative;z-index:1;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;
    color:var(--muted);text-transform:uppercase;
    margin-bottom:22px;
    opacity:0;animation:fadeUp .7s ease forwards;animation-delay:.05s;
  }
  .rec-dot{
    width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 var(--accent-line);
    animation:recPulse 1.8s ease-in-out infinite;
  }
  @keyframes recPulse{
    0%,100%{box-shadow:0 0 0 0 var(--accent-line);}
    50%{box-shadow:0 0 0 6px transparent;}
  }
  h1.name{
    font-size:clamp(32px,6vw,50px);
    line-height:1.08;
    letter-spacing:-.015em;
    max-width:14ch;
    margin-bottom:16px;
    opacity:0;animation:fadeUp .7s ease forwards;animation-delay:.14s;
  }
  .role{
    font-size:18px;font-weight:600;color:var(--text);margin-bottom:10px;
    opacity:0;animation:fadeUp .7s ease forwards;animation-delay:.22s;
  }
  .role .sep{color:var(--muted-dim);margin:0 8px;}
  .role .brand{color:var(--accent);}
  .tags{
    font-family:var(--mono);font-size:13px;color:var(--muted);
    margin-bottom:34px;letter-spacing:.01em;
    opacity:0;animation:fadeUp .7s ease forwards;animation-delay:.3s;
  }
  .contact-row{
    display:flex;flex-wrap:wrap;gap:10px;
    opacity:0;animation:fadeUp .7s ease forwards;animation-delay:.38s;
  }
  .contact-pill{
    font-family:var(--mono);font-size:12.5px;
    border:1px solid var(--panel-line);color:var(--muted);
    padding:9px 14px;border-radius:999px;
    transition:border-color .2s,color .2s;
  }
  .contact-pill:hover{border-color:var(--accent);color:var(--text);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- sections generic ---------- */
  section{padding:56px 0;border-bottom:1px solid var(--panel-line);}
  .section-label{
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;
    color:var(--accent);text-transform:uppercase;margin-bottom:22px;
  }
  .profile p{font-size:16.5px;line-height:1.75;color:#D9D4DD;max-width:64ch;}
  .collab-note{font-size:14px;color:var(--muted);margin:-8px 0 26px;max-width:60ch;font-style:italic;}

  /* ---------- credits / sessions ---------- */
  .session{padding:30px 0;border-top:1px solid var(--panel-line);}
  .session:first-of-type{border-top:none;padding-top:6px;}
  .session-head{
    display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;
    margin-bottom:10px;
  }
  .artist-name{font-size:21px;}
  .genre-tag{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    letter-spacing:.02em;
  }
  .standout{
    color:var(--muted);font-size:14.5px;line-height:1.6;
    max-width:62ch;margin-bottom:18px;font-style:italic;
  }
  .album-row{
    display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;
    padding:12px 16px;background:var(--panel);
    border:1px solid var(--panel-line);border-radius:8px;
    margin-bottom:16px;
  }
  .tag-label{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:var(--accent);font-weight:700;
  }
  .album-row .title{font-weight:700;font-size:15px;}
  .album-row .meta{font-size:13px;color:var(--muted);}
  .singles-label{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:var(--muted-dim);margin-bottom:8px;display:block;
  }
  .track-list{counter-reset:track;}
  .track-list li{counter-increment:track;}
  .track-list a{
    display:flex;align-items:center;gap:14px;
    padding:11px 14px;border-radius:6px;
    border-left:2px solid transparent;
    transition:background .18s,border-color .18s,padding-left .18s;
  }
  .track-list a:hover{
    background:var(--panel);border-left-color:var(--accent);padding-left:18px;
  }
  .track-list .idx{
    font-family:var(--mono);font-size:11px;color:var(--muted-dim);
    width:20px;flex-shrink:0;
  }
  .track-list .idx::before{content:counter(track,decimal-leading-zero);}
  .track-list .t-title{font-weight:700;font-size:14.5px;flex-shrink:0;}
  .track-list .t-genre{font-size:12.5px;color:var(--muted);flex:1;min-width:120px;}
  .track-list .t-extra{font-size:12px;color:var(--muted-dim);}
  .play{
    font-family:var(--mono);font-size:11.5px;color:var(--accent);
    flex-shrink:0;white-space:nowrap;
  }
  a.play:hover{text-decoration:underline;}
  .session.film .standout{font-style:normal;color:#D9D4DD;font-size:15px;}
  .session.film .single-link{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:12.5px;color:var(--accent);
    border:1px solid var(--accent-line);padding:9px 16px;border-radius:999px;
    margin-top:6px;transition:background .2s;
  }
  .session.film .single-link:hover{background:var(--accent-soft);}

  /* ---------- services ---------- */
  .services-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:14px;
  }
  .svc{
    background:var(--panel);border:1px solid var(--panel-line);
    border-radius:10px;padding:22px 22px 24px;
    transition:border-color .2s,background .2s;
  }
  .svc:hover{border-color:var(--accent-line);background:var(--bg-soft);}
  .svc-mark{display:block;width:20px;height:2px;background:var(--accent);margin-bottom:13px;}
  .svc h3{font-family:var(--body);font-weight:800;font-size:15.5px;margin-bottom:7px;}
  .svc p{font-size:13.5px;color:var(--muted);line-height:1.55;}

  /* ---------- education ---------- */
  .edu-list li{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:13px 0;border-top:1px solid var(--panel-line);
    font-size:14.5px;
  }
  .edu-list li:first-child{border-top:none;}
  .edu-list .school{font-weight:700;}
  .edu-list .degree{color:var(--muted);}

  /* ---------- footer ---------- */
  footer{padding:56px 0 80px;border-bottom:none;}
  .available{
    font-size:15.5px;line-height:1.7;color:#D9D4DD;max-width:58ch;margin-bottom:28px;
  }
  .available strong{color:var(--accent);font-weight:700;}
  footer .contact-row{margin-bottom:30px;}
  .foot-mark{
    font-family:var(--mono);font-size:11px;color:var(--muted-dim);
    letter-spacing:.1em;
  }

  /* ---------- responsive ---------- */
  @media (max-width:640px){
    .wrap{padding:0 20px;}
    .hero{padding:64px 0 48px;}
    .track-list .t-genre{flex-basis:100%;order:3;}
    .track-list a{flex-wrap:wrap;}
    section{padding:42px 0;}
    .services-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){
    .eq span{animation:none;transform:scaleY(.5);}
    .rec-dot{animation:none;}
    .eyebrow,h1.name,.role,.tags,.contact-row{
      opacity:1;animation:none;
    }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <span class="word">A8<span class="dot">●</span>RECORDINGNYC</span>
    <nav>
      <button class="lang-toggle" id="langToggle" type="button" aria-pressed="false">繁中</button>
      <a class="cta-mini" href="mailto:A8RECORDINGNYC@GMAIL.COM">
        <span class="en">Contact
